<div class="forgot-page">

  <div class="forgot-card glass">

    <div class="icon-circle">
      <i class="fa fa-key"></i>
    </div>

    <h2>Recover Account</h2>


    <!-- STEP BAR -->
    <div class="stepper">

      <div class="step" [class.active]="progress >= 25">1</div>
      <div class="line"></div>

      <div class="step" [class.active]="progress >= 50">2</div>
      <div class="line"></div>

      <div class="step" [class.active]="progress >= 75">3</div>
      <div class="line"></div>

      <div class="step" [class.active]="progress == 100">4</div>

    </div>



    <!-- STEP 1 USERNAME -->
    <div *ngIf="view === 'username'">

      <input class="form-control"
             placeholder="Enter Username"
             [(ngModel)]="username">

      <button class="btn-gradient"
              (click)="continue()"
              [disabled]="loading">
        Continue
      </button>

    </div>



    <!-- STEP 2 METHOD -->
    <div *ngIf="view === 'method'">

      <button class="btn-gradient"
              (click)="selectOtp()"
              [disabled]="loading">
        Recover via OTP
      </button>

      <button class="btn-outline"
              (click)="selectQuestions()"
              [disabled]="loading">
        Security Questions
      </button>

    </div>



    <!-- STEP 3 OTP -->
    <div *ngIf="view === 'verifyOtp'">

      <input class="form-control"
             placeholder="Enter OTP"
             [(ngModel)]="otp">

      <button class="btn-gradient"
              (click)="verifyOtp()"
              [disabled]="loading">
        Verify OTP
      </button>

    </div>



    <!-- STEP 3 QUESTIONS -->
    <div *ngIf="view === 'verifyQuestions'">

      <div *ngFor="let q of questions">

        <label>{{q.question}}</label>

        <input class="form-control"
               [(ngModel)]="q.answer">

      </div>

      <button class="btn-gradient"
              (click)="verifyQuestions()"
              [disabled]="loading">
        Verify Answers
      </button>

    </div>



    <!-- STEP 4 RESET -->
    <div *ngIf="view === 'reset'">

      <input type="password"
             class="form-control"
             placeholder="New Master Password"
             [(ngModel)]="newPassword">

      <button class="btn-gradient"
              (click)="resetPassword()"
              [disabled]="loading">
        Update Password
      </button>

    </div>

  </div>

</div>
